name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install LiteLLM
        run: pip install litellm[proxy]

      - name: Start LiteLLM Proxy
        run: |
          cat <<EOF > /tmp/litellm_config.yaml
          model_list:
            - model_name: claude-sonnet-4-6
              litellm_params:
                model: openrouter/qwen/qwen3-2.5-coder-32b-instruct:free
                api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          EOF
          nohup litellm --config /tmp/litellm_config.yaml --port 3456 &
          sleep 5
        env:
          OPENROUTER_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      
      - name: Test proxy model alias
        run: |
          curl -s -X POST http://localhost:3456/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: dummy-key" \
            -d '{
              "model": "claude-sonnet-4-6",
              "max_tokens": 10,
              "messages": [{"role": "user", "content": "hi"}]
            }'

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: "dummy-key"
          github_token: ${{ secrets.GH_TOKEN }}
          show_full_output: true
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
